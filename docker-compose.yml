services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: media_blog
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: app/Dockerfile
    env_file:
      - .env
    # environment:
    #   DATABASE_HOST: postgres
    #   REDIS_HOST: redis
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "alembic upgrade head && uvicorn app.api:app --host 0.0.0.0 --port 8000"

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    env_file:
      - .env
    environment:
      API_BASE_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  postgres_data: